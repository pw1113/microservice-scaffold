spring:
  application:
    name: microservice-gateway

  profiles:
    active: dev

  config:
    import: "optional:nacos:${spring.application.name}.yaml"


  cloud:
    # Nacos 服务发现与配置中心（基础设施配置，需在 profile 加载前解析）
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        username: nacos
        password: nacos
      config:
        server-addr: localhost:8848
        namespace: public
        file-extension: yaml
        username: nacos
        password: nacos
    # 配置网关
    gateway:
      server:
        webflux:
          routes: # 路由配置
            - id: microservice-user-service # 路由id，即配置的服务名
              uri: lb://microservice-user-service # lb表示负载均衡
              predicates: # 匹配规则，多个路径匹配规则用逗号隔开，分行配置表示and关系，逗号表示or关系
                - Path=/user/**

  # Redis配置
  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      password: ${redis.password}
      database: ${redis.database}
      timeout: 3000ms

# 服务器配置
server:
  port: 8080

# 日志配置
logging:
  file:
    path: logs/microservice-gateway

# JWT 配置（需与用户服务保持一致）
jwt:
  secret: bWljcm9zZXJ2aWNlLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTIwMjQ= #密钥
  access-token-ttl: 15m # 15 分钟
  refresh-token-ttl: 3d # 3 天

# 网关认证配置
gateway:
  auth:
    exclude-paths:
      - /user/login
      - /user/register
      - /user/refresh
      - /user/send-code
      - /doc.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /webjars/**
      - /favicon.ico
