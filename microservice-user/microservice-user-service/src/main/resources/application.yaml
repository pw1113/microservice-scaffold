spring:
  application:
    name: microservice-user-service

  # 激活的配置文件
  profiles:
    active: dev

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}


  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:123123}
      database: ${REDIS_DATABASE}
      timeout: 3000ms

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

  # 邮件配置
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# 业务配置
app:
  mail:
    from: ${MAIL_FROM:}

# 服务器配置
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

# MyBatis Plus配置
mybatis-plus:
  type-aliases-package: com.microservice.user.service.domain.po #
  type-enums-package: com.microservice.user.service.enums # 枚举包，自动识别 @EnumValue
  mapper-locations: "classpath*:/mapper/**/*.xml" # Mapper.xml文件地址，默认值
  configuration:
    map-underscore-to-camel-case: true # 开启下划线和驼峰的映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl #
  global-config:
    db-config:
      id-type: auto # 主键策略
      logic-delete-field: deleted # 逻辑删除字段名
      logic-delete-value: 1 # 逻辑删除值
      logic-not-delete-value: 0 # 逻辑不删除值
      update-strategy: not_null # 更新策略：只更新非空字段

# 日志配置
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.microservice: DEBUG
    org.springframework: WARN
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Springdoc配置（Swagger）
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
